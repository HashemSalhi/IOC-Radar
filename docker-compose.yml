services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      # Optional: keys can also be added at runtime via the Settings page
      # (they persist in the db_data volume). Set them here to pre-seed instead.
      - path: ./backend/.env
        required: false
    volumes:
      - db_data:/app
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
